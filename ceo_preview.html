<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Optiline — CEO Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#000; --panel:#0d0d0d; --card:#141414; --edge:#262626;
    --red:#E1251B; --white:#fff; --g3:#8a8a8a; --g4:#a8a8a8; --gdim:#6a6a6a;
    --green:#34c759; --amber:#f5a623;
    --fb:'Inter',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
    --fh:'Helvetica Neue','HelveticaNeue-Bold','Inter',Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--black);color:var(--white);font-family:var(--fb);-webkit-font-smoothing:antialiased;}
  #app{max-width:1280px;margin:0 auto;padding:26px 26px 60px;}

  header{display:flex;align-items:center;gap:20px;flex-wrap:wrap;border-bottom:2px solid var(--red);padding-bottom:18px;margin-bottom:22px;}
  header .logo{height:40px;width:auto;}
  header .htitle{font-family:var(--fh);font-weight:800;font-size:26px;letter-spacing:2px;}
  header .hmeta{margin-left:auto;text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
  .live{display:inline-flex;align-items:center;gap:7px;background:var(--red);color:#fff;font-family:var(--fh);font-weight:700;font-size:11px;letter-spacing:2px;padding:4px 12px;border-radius:20px;}
  .live .dot{width:7px;height:7px;border-radius:50%;background:#fff;animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .asof{font-family:var(--fh);font-weight:700;font-size:15px;letter-spacing:.5px;}
  .asof b{color:var(--red);}

  .sec{margin-top:26px;}
  .sec-h{display:flex;align-items:center;gap:11px;font-family:var(--fh);font-weight:700;font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--g4);margin-bottom:14px;}
  .chev{width:0;height:0;border-top:8px solid transparent;border-bottom:8px solid transparent;border-left:11px solid var(--red);}

  .grid{display:grid;gap:14px;}
  .g4{grid-template-columns:repeat(4,1fr);}
  .g3{grid-template-columns:repeat(3,1fr);}
  @media(max-width:880px){.g4{grid-template-columns:repeat(2,1fr);}.g3{grid-template-columns:1fr;}}
  @media(max-width:520px){.g4{grid-template-columns:1fr;}}

  .card{background:var(--card);border:1px solid var(--edge);border-radius:14px;padding:16px 18px;}
  .card .k{font-size:11.5px;letter-spacing:1px;text-transform:uppercase;color:var(--gdim);font-weight:600;line-height:1.3;min-height:28px;}
  .card .v{font-family:var(--fh);font-weight:700;font-size:27px;margin:6px 0 9px;letter-spacing:.3px;}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;letter-spacing:.5px;padding:3px 10px;border-radius:20px;text-transform:uppercase;}
  .st-stable{background:rgba(138,138,138,.16);color:#bdbdbd;}
  .st-attn{background:rgba(245,166,35,.16);color:var(--amber);}
  .st-up{background:rgba(52,199,89,.16);color:var(--green);}

  /* trajectory */
  .traj{background:var(--card);border:1px solid var(--edge);border-radius:14px;padding:18px 20px;}
  .traj .tk{font-family:var(--fh);font-weight:700;font-size:16px;letter-spacing:.5px;}
  .traj .tgt{font-size:12px;color:var(--gdim);margin-top:2px;}
  .bar{height:11px;background:#222;border-radius:6px;overflow:hidden;margin:13px 0 12px;}
  .bar > span{display:block;height:100%;background:var(--red);border-radius:6px;}
  .traj .pct{font-family:var(--fh);font-weight:800;font-size:22px;}
  .vrow{display:flex;justify-content:space-between;font-size:12.5px;margin-top:4px;color:var(--g4);}
  .vrow b{color:#fff;font-weight:700;}

  /* table */
  .tbl-wrap{overflow-x:auto;border:1px solid var(--edge);border-radius:14px;}
  table{border-collapse:collapse;width:100%;min-width:640px;font-size:13px;}
  th,td{padding:11px 14px;text-align:right;white-space:nowrap;border-bottom:1px solid #1c1c1c;}
  th{font-family:var(--fh);font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--g4);background:var(--panel);}
  td:first-child,th:first-child{text-align:left;position:sticky;left:0;background:var(--card);font-weight:600;}
  th:first-child{background:var(--panel);}
  tbody tr:hover td{background:#181818;}
  td.total,th.total{color:var(--red);font-weight:700;font-family:var(--fh);}

  /* chart */
  .chart{background:var(--card);border:1px solid var(--edge);border-radius:14px;padding:20px 18px 12px;}
  .bars{display:flex;align-items:flex-end;gap:10px;height:210px;padding-top:10px;}
  .bcol{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:7px;}
  .bcol .bval{font-size:10.5px;color:var(--g4);font-weight:600;}
  .bcol .bbar{width:100%;max-width:46px;background:linear-gradient(180deg,var(--red),#9c1a12);border-radius:5px 5px 0 0;min-height:3px;}
  .bcol .bm{font-size:11px;color:var(--gdim);font-weight:600;letter-spacing:.5px;}

  footer{margin-top:34px;text-align:center;font-size:10.5px;letter-spacing:2px;color:#3a3a3a;text-transform:uppercase;}
</style>
</head>

function esc(s){return (s==null?'':String(s));}
function stat(s){
  s=esc(s); var txt=s.replace(/[▲▼—–-]+/g,'').trim(), cls='st-stable', ic='—';
  if(/attention/i.test(s)||/▼/.test(s)){cls='st-attn';ic='▼';}
  else if(/▲/.test(s)){cls='st-up';ic='▲';}
  if(!txt)txt='Stable';
  return '<span class="pill '+cls+'">'+ic+' '+txt+'</span>';
}
function pctNum(p){var m=esc(p).match(/[\d.]+/);return m?Math.min(100,parseFloat(m[0])):0;}
function money(v){var a=Math.abs(v);if(a>=1e6)return '$'+(v/1e6).toFixed(1)+'M';if(a>=1e3)return '$'+Math.round(v/1e3)+'K';return '$'+Math.round(v);}

function card(k,v,s){
  return '<div class="card"><div class="k">'+esc(k)+'</div><div class="v">'+esc(v)+'</div>'+(s?'<div>'+stat(s)+'</div>':'')+'</div>';
}
function section(title,inner){
  return '<div class="sec"><div class="sec-h"><span class="chev"></span>'+title+'</div>'+inner+'</div>';
}

  out+=section('2026 Profit Trajectory vs Target','<div class="grid g3">'+tr+'</div>');

    (D.covenant&&D.covenant.note?'<div class="card" style="margin-top:14px"><div class="k">Covenant Note</div><div style="font-size:14px;color:#ddd;margin-top:6px">'+esc(D.covenant.note)+'</div></div>':''));

  // Owner distributions
  out+=section('Owner Distributions',
    '<div class="grid g3">'+
      card('Distribution Limit (Annual Bank Covenant)',D.ownerLimit,'')+
      card('Distributed to Date',D.ownerThrough,'')+
      card('Remaining',D.ownerRemaining,'')+
    '</div>');

  // Bids & awards table
  var regs=D.regions||[];
  var thead='<tr><th></th><th class="total">Total</th>'+regs.map(function(r){return '<th>'+esc(r)+'</th>';}).join('')+'</tr>';
  function brow(label,obj){
    return '<tr><td>'+label+'</td><td class="total">'+esc(obj.total)+'</td>'+(obj.vals||[]).map(function(v){return '<td>'+esc(v)+'</td>';}).join('')+'</tr>';
  }
  var tbody=brow('Bids Submitted 2026',D.bidsSubmitted)+brow('Current New Bids 2026',D.newBids)+brow('2026 Awards',D.awards)+brow('Current Open Bids',D.openBids);
  out+=section('Bids &amp; Awards by Region',
    '<div class="grid g4" style="margin-bottom:14px">'+
      card('Hit Rate — All 2026 Bids',D.hitRateAll,'')+
      card('Hit Rate — New Bids Only',D.hitRateNew,'')+
      card('Last Week Contract Awards',D.lastWeekAwards,'')+
      card('Awards Projects',(D.lastWeekProjects||'').replace(/[^0-9]/g,'')||'—','')+
    '</div>'+
    '<div class="tbl-wrap"><table><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table></div>');

  // Monthly chart
  var mt=D.monthlyTotals||[], mm=D.months||[];
